---
apiVersion: v1
kind: Namespace
metadata:
  name: etcd-infra
  labels:
    app: etcd-infra
    # Privileged host-access workload; keep this namespace cluster-admin only.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
  annotations:
    # Clear any default project node selector so master-targeted pods can schedule.
    openshift.io/node-selector: ''
    openshift.io/description: >-
      etcd backup CronJob (privileged, hostPath, hostNetwork). Restrict RBAC
      to cluster admins. Treat ConfigMaps and CronJob as highly privileged.
